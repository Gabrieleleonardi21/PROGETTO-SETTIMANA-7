<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SportsHub — Eventi sportivi</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <hgroup>
        <h1 class="site-title">SportsHub</h1>
        <p class="site-subtitle">Cerca una squadra, scopri prossime partite e ultimi risultati</p>
      </hgroup>
      <form id="search-form" class="search-form">
        <input
          id="search-input"
          class="search-input"
          type="text"
          placeholder="Cerca una squadra…"
          autocomplete="off"
          required
        />
        <button type="submit" class="btn-cerca">Cerca</button>
      </form>
    </header>

    <main class="container">
      <!-- Filtro per sport -->
      <div class="filtro-sport">
        <button type="button" class="btn-filtro btn-filtro--attivo" data-sport="">Tutti</button>
        <button type="button" class="btn-filtro" data-sport="Soccer">Calcio</button>
        <button type="button" class="btn-filtro" data-sport="Basketball">Basket</button>
        <button type="button" class="btn-filtro" data-sport="American Football">Football</button>
      </div>

      <!-- Sezione preferiti: visibile solo se ci sono squadre salvate -->
      <section id="preferiti-section" class="preferiti-section" hidden>
        <h2 class="preferiti-titolo">⭐ Le tue squadre preferite</h2>
        <div id="griglia-preferiti" class="griglia-preferiti"></div>
      </section>

      <!-- Prossimi appuntamenti delle squadre preferite (caricati in parallelo all'avvio) -->
      <section id="appuntamenti-section" class="appuntamenti-section" hidden>
        <h2 class="preferiti-titolo">📅 I tuoi prossimi appuntamenti</h2>
        <ul id="lista-appuntamenti" class="lista-appuntamenti"></ul>
      </section>

      <!-- Intestazione persistente: appare dopo la prima ricerca e resta visibile anche nei dettagli -->
      <h2 id="risultati-heading" class="sezione-titolo" hidden>Squadre trovate</h2>

      <section id="risultati-section">
        <!-- Spinner, errore, griglia card squadre -->
        <div id="spinner" class="spinner" hidden></div>
        <div id="errore" class="errore" hidden></div>
        <div id="griglia-squadre" class="griglia-squadre"></div>
      </section>

      <section id="dettagli-section" hidden>
        <!-- Visibile dopo click su una squadra -->
        <button id="btn-indietro" class="btn-indietro">
          ← Torna ai risultati
        </button>
        <div id="dettagli-header" class="dettagli-header"></div>
        <div class="dettagli-eventi">
          <div>
            <h2 class="eventi-titolo">Prossimi eventi</h2>
            <ul id="lista-prossimi" class="lista-eventi"></ul>
          </div>
          <div>
            <h2 class="eventi-titolo">Ultimi risultati</h2>
            <ul id="lista-ultimi" class="lista-eventi"></ul>
          </div>
        </div>
      </section>
    </main>

    <!-- Modal dettagli evento -->
    <div id="modal-evento" class="modal" hidden>
      <div id="modal-overlay" class="modal-overlay"></div>
      <div class="modal-contenuto">
        <button id="modal-chiudi" class="modal-chiudi" aria-label="Chiudi">✕</button>
        <h3 id="modal-titolo" class="modal-titolo"></h3>
        <div id="modal-corpo"></div>
      </div>
    </div>

    <!-- Caricamento in ordine: api → ui → main -->
    <script src="assets/js/api.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
